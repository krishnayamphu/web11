<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      /* css dimension 
        width: auto | <length> | <percentage> | max-content | min-content | fit-content
        max-width:length;
        min-width:length;

        height: length;
        min-height:length;
        max-height:length;


      */
      .box1 {
        width: 100px;
        height: 100px;
        background-color: red;
      }

      .box2 {
        width: 100%;
        height: 100px;
        background-color: rgb(38, 0, 255);
      }

      .container {
        width: 100%;
        max-width: 800px;
        background-color: purple;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>

    <br />

    <div class="container">
      <h1>Hello World</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ab pariatur
        placeat fugiat porro ipsam! Ipsum debitis dolor sunt quisquam repellat
        hic, asperiores atque quas iure suscipit vitae odit dolore! Vel!
      </p>
    </div>
  </body>
</html>
