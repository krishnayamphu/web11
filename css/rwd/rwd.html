<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Web Design</title>
    <style>
      /* 
        @media screen and (max-width:length){
                selector{ css properties}
        }

         @media (min-width:length) and (max-width:length){
                selector{ css properties}
        }
      */

      body {
        background-color: pink;
      }

      @media screen and (max-width: 600px) {
        body {
          background-color: lightgreen;
        }
      }
    </style>
  </head>
  <body>
    <h1>Responsive Web Design</h1>
    <p>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Accusantium
      impedit in facilis laboriosam qui, assumenda dignissimos optio. Rerum
      soluta aliquam adipisci, suscipit maiores, voluptate quo nemo pariatur
      quasi inventore voluptas?
    </p>
  </body>
</html>
