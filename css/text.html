<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      /* css font
      text-align:left|right|center|justify
      text-decoration:none|underline|overline|line-through
      text-transform:uppercase|lowercase|capitalize
      text-indent:indent_value
      line-height:size
      letter-spacing:size
      word-spacing:spacing_value
      */
      h1 {
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        text-decoration: underline;
        text-transform: uppercase;
        letter-spacing: 15px;
      }
      p {
        font-family: Arial, Helvetica, sans-serif;
        text-align: justify;
        line-height: 1.5;
        word-spacing: 10px;
        text-indent: 50px;
      }
    </style>
  </head>
  <body>
    <h1>Hello World</h1>
    <p>
      Lorem ipsum dolor sit amet, consectetur adipisicing elit. Ab pariatur
      placeat fugiat porro ipsam! Ipsum debitis dolor sunt quisquam repellat
      hic, asperiores atque quas iure suscipit vitae odit dolore! Vel!
    </p>
  </body>
</html>
