<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      /* css
      border-style: none | hidden | dotted | dashed | solid | double | groove | ridge | inset | outset;
      border-width: thin | medium | thick | <length>;
      border-color: <color>;
      border: <border-width> || <border-style> || <border-color>;

      */

      .box1 {
        width: 600px;
        padding: 15px;
        background-color: red;
        margin: 15px auto;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        border-style: solid;
        border-width: 5px;
        border-color: black;
      }

      .box2 {
        width: 600px;
        padding: 15px;
        height: 100px;
        background-color: red;
        margin: 15px auto;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        border: 10px solid rgb(21, 0, 255);
      }

      .box3 {
        width: 600px;
        padding: 15px;
        height: 100px;
        background-color: red;
        margin: 15px auto;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        border: 10px solid rgb(21, 0, 255);
        border-left: none;
        border-right: none;
      }

      .box4 {
        width: 0px;
        height: 0px;
        border-left: 100px solid transparent;
        border-right: 100px solid transparent;
        border-top: 100px solid blue;
        border-bottom: 100px solid transparent;
      }
    </style>
  </head>
  <body>
    <div class="box1">
      <h1>hello world</h1>
      <p>
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Molestiae
        officia laudantium ad recusandae iure perferendis sed rem obcaecati
        porro nihil cumque in ipsam tempora, voluptatibus incidunt similique qui
        soluta hic.
      </p>
    </div>

    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
  </body>
</html>
