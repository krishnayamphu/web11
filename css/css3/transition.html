<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      /* css transition
        transtion-property: all | property-name | none;
        transtion-duration: time;
        transtion-timing-function: ease | linear | ease-in | ease-out | ease-in-out | cubic-bezier(n,n,n,n);
        transtion-delay: time;
        transtion: property-name duration timing-function delay;
      */

      .box1 {
        width: 100px;
        height: 100px;
        background-color: red;
        transition-property: all;
        transition-duration: 2s;
        transition-timing-function: ease;
        transition-delay: 0s;
      }
      .box1:hover {
        background-color: blue;
        border-radius: 25px;
        width: 200px;
      }
      h1 {
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        transition: all 1s linear 0s;
      }
      h1:hover {
        font-size: 60px;
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <h1>Hello World</h1>
  </body>
</html>
