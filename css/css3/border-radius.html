<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      /* css
border-radius: 10px;

      */
      div {
        width: 100px;
        height: 100px;
        background-color: red;
        margin: 15px;
      }

      .box1 {
        border-radius: 15px;
      }

      .box2 {
        border-radius: 0px 25px;
      }

      .box3 {
        border-radius: 0px 25px 25px 25px;
      }

      .box4 {
        border-radius: 50%;
      }
      .box5 {
        height: 25px;
        border-radius: 50px;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
    <div class="box5"></div>
  </body>
</html>
