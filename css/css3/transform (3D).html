<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      /* css background-size
      transform:translateX(x),translateY(y),translateZ(z),translate3d(x, y, z) |
                scaleX(x),scaleY(y),scaleZ(z),scale3d(x, y, z) |
                rotateX(angle),rotateY(angle),rotateZ(angle),rotate3d(x, y, z, angle);

      perspective:perspective(length);
      backface-visibility:visible|hidden;
       */
      section {
        border: 2px solid black;
        margin: 15px;
        perspective: 1000px;
      }
      div {
        width: 100px;
        height: 100px;
        background-color: red;
        border: 2px solid black;
        margin: 15px;
        display: inline-block;
        transition: all 1s ease;
      }

      .box1:hover {
        transform: translateX(100px);
      }

      .box2:hover {
        transform: translateY(100px);
      }

      .box3:hover {
        transform: translateZ(-100px);
      }
      .box4:hover {
        transform: translate3d(100px, 100px, -100px);
      }
      .box5:hover {
        transform: scaleX(2);
      }
      .box6:hover {
        transform: scaleY(2);
      }
      .box7:hover {
        transform: scaleZ(2);
      }
      .box8:hover {
        transform: scale3d(2, 2, 2);
      }

      .box9:hover {
        transform: rotateX(180deg);
      }
      .box10:hover {
        transform: rotateY(180deg);
      }
      .box11:hover {
        transform: rotateZ(45deg);
      }
      .box12:hover {
        transform: rotate3d(1, 0, -1, 360deg);
      }
    </style>
  </head>
  <body>
    <section>
      <div class="box1">box</div>
      <div class="box2">box</div>
      <div class="box3">box</div>
      <div class="box4">box</div>
    </section>

    <section>
      <div class="box5">box</div>
      <div class="box6">box</div>
      <div class="box7">box</div>
      <div class="box8">box</div>
    </section>

    <section>
      <div class="box9">box</div>
      <div class="box10">box</div>
      <div class="box11">box</div>
      <div class="box12">box</div>
    </section>
  </body>
</html>
