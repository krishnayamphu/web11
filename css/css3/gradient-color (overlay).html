<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      div {
        width: 800px;
        height: 400px;
        border: 2px solid black;
        margin: 15px auto;
        background-size: cover;
        font-size: 60px;
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
        line-height: 400px;
        color: white;
      }

      .box1 {
        background-image:
          linear-gradient(rgba(255, 0, 0, 0.482), blue), url(../1.webp);
      }

      .box2 {
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.9)),
          url(../1.webp);
      }
    </style>
  </head>
  <body>
    <div class="box1">Hello World</div>
    <div class="box2">Hello World</div>
  </body>
</html>
