<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      div {
        border: 2px solid red;
        padding: 10px;
      }
      section {
        border: solid 2px blue;
        padding: 5px;
      }
      div > p {
        color: red;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>CSS Combinators</h1>
      <p>This is a simple example of CSS combinators.</p>
      <section>
        <p>This is a paragraph inside a section.</p>
      </section>
    </div>
  </body>
</html>
