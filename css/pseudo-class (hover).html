<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      .box {
        width: 400px;
        padding: 10px 20px;
        background-color: lightgray;
        border: 2px solid red;
        margin: 20px auto;
      }
      .box:hover {
        background-color: black;
        color: white;
        border-radius: 25px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Hover over me!</h1>
      <p>
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Dolor vero quo
        magni qui error delectus aut! Aperiam ipsum dicta veniam excepturi
        facilis aut dolore rerum? Accusamus neque odit magnam explicabo.
      </p>
    </div>
  </body>
</html>
