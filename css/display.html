<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css</title>
    <style>
      /* css
     display: block | inline | inline-block | none | inherit;

      */

      div {
        width: 100px;
        height: 100px;
        background-color: red;
        margin: 5px;
        display: inline;
      }

      span {
        width: 100px;
        height: 100px;
        background-color: blue;
        margin: 5px;
        display: block;
      }

      a {
        background-color: yellow;
        width: 100px;
        height: 100px;
        display: inline-block;
      }

      p {
        display: none;
      }

      h1 {
        background-color: inherit;
        display: inherit;
      }
    </style>
  </head>
  <body>
    <div>div 1</div>
    <div>div 2</div>

    <hr />

    <span>Inline 1</span>
    <span>Inline 2</span>

    <hr />

    <a href="#">Link 1</a>
    <a href="#">Link 2</a>
    <a href="#">Link 3</a>

    <p>
      Lorem ipsum dolor sit, amet consectetur adipisicing elit. Culpa ad,
      reprehenderit accusantium accusamus repellat aliquid sapiente nobis
      debitis, eveniet modi similique voluptas obcaecati sunt autem deserunt
      molestias maxime nulla minus?
    </p>

    <div>
      <h1>Heading 1</h1>
    </div>
  </body>
</html>
