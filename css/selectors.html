<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link</title>
    <style>
      /* css selector:
       1. ID selector 2. Class selector
        
       #idname{ css properties }
       .classname{ css properties }
        */

      #heading {
        color: blue;
        background-color: yellow;
      }
      .content-body {
        color: rgb(0, 2, 128);
        background-color: rgb(180, 125, 231);
      }

      .text-justify {
        text-align: justify;
      }
      .text-yellow {
        color: yellow;
      }
    </style>
  </head>
  <body>
    <h1 id="heading">Hello World</h1>
    <p class="content-body text-justify text-yellow">
      Lorem ipsum dolor sit, amet consectetur adipisicing elit. Aliquam
      voluptates accusantium ratione optio, reiciendis quisquam culpa sequi
      eveniet, maxime ipsa aperiam incidunt. Dolorum earum accusamus tenetur
      molestias reprehenderit praesentium quae!
    </p>

    <h1 class="text-yellow">Welcome to CSS</h1>
  </body>
</html>
