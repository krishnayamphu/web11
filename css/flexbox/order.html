<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .row {
        border: 1px solid black;
        margin: 15px;
        display: flex;
      }
      .col {
        background-color: pink;
        padding: 5px 10px;
      }
      .col:nth-child(even) {
        background-color: lightseagreen;
      }
      .col:last-child {
        background-color: rgb(214, 235, 136);
      }

      .order-1 {
        order: 1;
      }
      .order-2 {
        order: 2;
      }
      .order-3 {
        order: 3;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="col">1</div>
      <div class="col">2</div>
      <div class="col">3</div>
    </div>

    <div class="row">
      <div class="col order-3">1</div>
      <div class="col order-2">2</div>
      <div class="col order-1">3</div>
    </div>

    <div class="row">
      <div class="col order-2">1</div>
      <div class="col order-3">2</div>
      <div class="col order-1">3</div>
    </div>
  </body>
</html>
