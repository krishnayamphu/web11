<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table`</title>
    <style>
      /* 
            <table>
      <tr>
        <th></th>
        <td></td>
      </tr>

      ....
    </table> 
    
    th|td attributes:
    1. colspan=number
    2. rowspan=number

    table css:
    1. border-collapse: collapse|separate;
    */
      table {
        border-collapse: collapse;
        margin: 15px auto;
        background-color: #ccc;
      }
      th,
      td {
        border: 1px solid rgb(37, 112, 224);
        padding: 5px;
      }

      .table-1 {
        background-color: white;
      }
      .table-heading {
        background-color: rgb(47, 8, 155);
        color: white;
      }
      .table-body-cell {
        background-color: aquamarine;
        color: red;
      }
      .table-1 th,
      .table-1 td {
        border: 1px dashed red;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>Name</th>
        <th>Address</th>
        <th>Age</th>
      </tr>
      <tr>
        <td>John Doe</td>
        <td>123 Main St</td>
        <td>30</td>
      </tr>
      <tr>
        <td>Jane Smith</td>
        <td>456 Oak Ave</td>
        <td>25</td>
      </tr>
    </table>

    <table>
      <tr>
        <th colspan="2">Amount</th>
      </tr>
      <tr>
        <td>Ruppese</td>
        <td>Paisa</td>
      </tr>
    </table>

    <table>
      <tr>
        <th rowspan="2">Country</th>
        <td>USA</td>
      </tr>
      <tr>
        <td>Japan</td>
      </tr>
    </table>

    <hr />

    <table class="table-1">
      <tr class="table-heading">
        <th>Name</th>
        <th>Address</th>
        <th>Age</th>
      </tr>
      <tr>
        <td>John Doe</td>
        <td>123 Main St</td>
        <td>30</td>
      </tr>
      <tr>
        <td>Jane Smith</td>
        <td>456 Oak Ave</td>
        <td class="table-body-cell">25</td>
      </tr>
    </table>
  </body>
</html>
