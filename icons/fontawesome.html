<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icons</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .text-primary {
        color: rgb(51, 66, 228);
      }
      .text-warning {
        color: rgb(255, 193, 7);
      }
      .text-danger {
        color: rgb(220, 53, 69);
      }
    </style>
  </head>
  <body>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-solid fa-user"></i>
    <i class="fa-solid fa-camera"></i>
    <i class="fa-solid fa-home"></i>
    <i class="fa-solid fa-bell"></i>

    <h2>Styling Icons</h2>
    <i class="fa-solid fa-home"></i>
    <i class="fa-solid fa-home text-primary"></i>
    <i class="fa-solid fa-home text-warning"></i>
    <i class="fa-solid fa-home text-danger"></i>

    <h2>Sizing Icons</h2>
    <i class="fa-solid fa-home fa-lg"></i>
    <i class="fa-solid fa-home fa-2xl"></i>
    <i class="fa-solid fa-home fa-3x"></i>

    <h2>List Icons</h2>
    <ul class="fa-ul">
      <li>
        <span class="fa-li"><i class="fa-solid fa-check-square"></i></span>List
        icons can
      </li>
      <li>
        <span class="fa-li"><i class="fa-solid fa-check-square"></i></span>be
        used to
      </li>
      <li>
        <span class="fa-li"><i class="fa-solid fa-spinner fa-pulse"></i></span
        >replace bullets
      </li>
      <li>
        <span class="fa-li"><i class="fa-regular fa-square"></i></span>in lists
      </li>
    </ul>

    <h2>Rotating and Flipping Icons</h2>
    <div class="fa-3x">
      <i class="fa-solid fa-snowboarding"></i>
      <i class="fa-solid fa-snowboarding fa-rotate-90"></i>
      <i class="fa-solid fa-snowboarding fa-rotate-180"></i>
      <i class="fa-solid fa-snowboarding fa-rotate-270"></i>
      <i class="fa-solid fa-snowboarding fa-flip-horizontal"></i>
      <i class="fa-solid fa-snowboarding fa-flip-vertical"></i>
      <i class="fa-solid fa-snowboarding fa-flip-both"></i>
    </div>

    <h2>Animated Icons</h2>
    <div class="fa-3x">
      <i class="fa-solid fa-circle-plus fa-beat"></i>
      <i class="fa-solid fa-heart fa-beat"></i>
      <i
        class="fa-solid fa-heart fa-beat"
        style="--fa-animation-duration: 0.5s"
      ></i>
      <i
        class="fa-solid fa-heart fa-beat"
        style="--fa-animation-duration: 2s"
      ></i>
      <i class="fa-solid fa-heart fa-beat" style="--fa-beat-scale: 2"></i>
    </div>

    <div class="fa-3x">
      <i class="fa-solid fa-sync fa-spin"></i>
      <i class="fa-solid fa-circle-notch fa-spin"></i>
      <i class="fa-solid fa-cog fa-spin"></i>
      <i class="fa-solid fa-cog fa-spin fa-spin-reverse"></i>
      <i class="fa-solid fa-spinner fa-spin-pulse"></i>
      <i class="fa-solid fa-spinner fa-spin-pulse fa-spin-reverse"></i>
    </div>

    <div class="fa-3x">
      <i class="fa-solid fa-bell fa-shake"></i>
      <i class="fa-solid fa-lock fa-shake"></i>
      <i class="fa-solid fa-stopwatch fa-shake"></i>
      <i class="fa-solid fa-bomb fa-shake"></i>
    </div>

    <h2>Customizing Icons</h2>
    <i class="fa-brands fa-square-facebook"></i>
    <i class="fa-brands fa-square-twitter"></i>
    <i class="fa-brands fa-square-instagram"></i>

    <hr />

    <a href="https://www.youtube.com/"><i class="fa-brands fa-youtube"></i></a>

    <hr />

    <button>
      <i class="fa-solid fa-cart-shopping"></i>
      Add to Cart
    </button>

    <button>
      <i class="fa-solid fa-heart"></i>
      Add to Favorites
    </button>
    <button>
      <i class="fa-solid fa-magnifying-glass"></i>
      Search
    </button>
    <button>
      <i class="fa-solid fa-user"></i>
      Profile
    </button>
  </body>
</html>
