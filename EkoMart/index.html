<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home | EkoMart</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="site-top-bar border-bottom">
        <div
          class="container d-flex justify-content-between align-items-center py-2 text-white"
        >
          <span>Welcome to our Organic store EkoMart!</span>
          <div class="nav">
            <a class="nav-link text-white" href="#">Track Order</a>
            <a class="nav-link text-white" href="#">About Us</a>
            <a class="nav-link text-white" href="#">Contact</a>
            <a class="nav-link text-white" href="#">FAQ</a>
          </div>
        </div>
      </div>

      <div class="container">
        <div class="d-flex justify-content-between align-items-center py-4">
          <div>
            <a href="#"><img src="images/logo-02.svg" alt="eko-mart" /></a>
          </div>
          <div class="d-flex align-items-center gap-2 bg-white rounded">
            <div class="input-group">
              <button
                class="btn btn-outline-secondary dropdown-toggle py-3 px-2"
                type="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="fa-solid fa-bars-staggered"></i>
                Cagegories
              </button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li>
                  <a class="dropdown-item" href="#">Something else here</a>
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li><a class="dropdown-item" href="#">Separated link</a></li>
              </ul>
              <input
                type="text"
                class="form-control border-0"
                style="width: 400px"
                aria-label="Text input with dropdown button"
              />
            </div>
            <button
              class="btn btn-primary d-flex align-items-center gap-2 px-4 py-2 me-2"
            >
              <span>Search</span>
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
          <div>
            <a class="btn btn-light bg-white" href="#">
              <i class="fa-solid fa-user"></i> Account
            </a>
            <a class="btn btn-light bg-white" href="#">
              <i class="fa-solid fa-user"></i> Account
            </a>
            <a class="btn btn-light bg-white" href="#">
              <i class="fa-solid fa-user"></i> Account
            </a>
          </div>
        </div>
      </div>
    </header>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
