<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      //parseInt(),parseFloat(),eval()

      document.writeln("<br>" + parseInt("10"));
      document.writeln("<br>" + parseInt("10.5"));
      document.writeln("<br>" + parseInt("10a"));
      document.writeln("<br>" + parseInt("a10"));

      document.writeln("<hr>" + parseFloat("10"));
      document.writeln("<br>" + parseFloat("10.5"));
      document.writeln("<br>" + parseFloat("10a"));
      document.writeln("<br>" + parseFloat("a10"));

      document.writeln("<hr>" + eval("10+5*2/5"));
      document.writeln("<br>" + eval("a+10"));
    </script>
  </body>
</html>
