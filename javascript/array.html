<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      const name = new Array("Ram", "Shyam", "Hari");
      document.writeln(name[0]);

      document.writeln("<hr>");
      for (let i = 0; i < name.length; i++) {
        document.writeln(name[i] + "<br>");
      }
    </script>
  </body>
</html>
