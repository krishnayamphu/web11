<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      let x = parseFloat(prompt("Enter value of x: ", ""));
      let y = parseFloat(prompt("Enter value of y: ", ""));

      let sum = x + y;
      let avg = sum / 2;

      document.writeln("<p>Total sum: " + sum + "</p>");
      document.writeln("<p>Average: " + avg + "</p>");
    </script>
  </body>
</html>
