<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <input id="name" type="text" oninput="toBlockLetter()" />
    <span id="output"></span>
    <script>
      function toBlockLetter() {
        let name = document.getElementById("name").value;
        document.getElementById("name").value = name.toUpperCase();
        document.getElementById("output").innerText = name.length;
      }
    </script>
  </body>
</html>
