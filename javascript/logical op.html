<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      //&& => AND, || => OR, ! => NOT

      let x = 50;
      let y = 6;
      let z = 7;
      document.writeln(x > 0 && y < 0);
      document.writeln("<br>" + (x > 0 || y < 0));
      document.writeln("<br>" + (y != x));

      document.writeln("<br>" + (y > x ? "y is greater" : "x is greater"));
    </script>
  </body>
</html>
