<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript</title>
  </head>
  <body>
    <script>
      let temp = 5;

      if (temp >= 35) {
        alert("High Temperature!");
      }

      let x = 50;
      let y = 10;

      if (x > y) {
        document.writeln("x is greater");
      } else {
        document.writeln("y is greater");
      }

      let math = 5;
      if (math >= 35) {
        alert("Pass");
      } else {
        alert("Fail");
      }

      document.writeln("<hr>");

      let marks = 10;
      if (marks >= 90) {
        document.writeln("Excellent");
      } else if (marks >= 75) {
        document.writeln("Very Good");
      } else if (marks > 60) {
        document.writeln("Good");
      } else if (marks >= 45) {
        document.writeln("Satisfactory");
      } else {
        document.writeln("Poor");
      }
    </script>
  </body>
</html>
